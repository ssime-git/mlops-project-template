# Prometheus configuration
# Phase 4: Monitoring setup

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape the API for metrics
  - job_name: 'ml-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']