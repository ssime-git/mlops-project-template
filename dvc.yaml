stages:
  preprocess:
    cmd: python -m training preprocess
    deps:
      - src/training
      - src/common
      - data/raw
    params:
      - configs/train.yaml:
          - data
    outs:
      - data/processed

  train:
    cmd: python -m training train
    deps:
      - src/training
      - src/common
      - data/processed
    params:
      - configs/train.yaml:
          - model
          - training
    outs:
      - models
    metrics:
      - metrics/train_metrics.json

  evaluate:
    cmd: python -m training evaluate
    deps:
      - models
      - data/processed
    metrics:
      - metrics/eval_metrics.json
    plots:
      - metrics/eval_metrics.json:
          x: threshold
          y: [precision, recall]